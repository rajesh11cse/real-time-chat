# AI-generated docker-compose for real-time chat system
version: '3.9'

services:
  postgres-user:
    image: postgres:16-alpine
    container_name: postgres-user
    restart: unless-stopped
    environment:
      POSTGRES_DB: userdb
      POSTGRES_USER: user
      POSTGRES_PASSWORD: userpass
    ports:
      - "5433:5432"
    volumes:
      - postgres-user-data:/var/lib/postgresql/data
      # AI-generated: initialize schema on first boot
      - ./backend/user-service/db/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    networks:
      - backend

  postgres-chat:
    image: postgres:16-alpine
    container_name: postgres-chat
    restart: unless-stopped
    environment:
      POSTGRES_DB: chatdb
      POSTGRES_USER: chat
      POSTGRES_PASSWORD: chatpass
    ports:
      - "5434:5432"
    volumes:
      - postgres-chat-data:/var/lib/postgresql/data
      # AI-generated: initialize schema on first boot
      - ./backend/chat-service/db/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    networks:
      - backend

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - backend

  user-service-1:
    build:
      context: ./backend/user-service
    container_name: user-service-1
    restart: unless-stopped
    environment:
      PORT: 4001
      USER_DB_URL: postgres://user:userpass@postgres-user:5432/userdb
      JWT_SECRET: supersecretjwt
    depends_on:
      - postgres-user
    networks:
      - backend

  user-service-2:
    build:
      context: ./backend/user-service
    container_name: user-service-2
    restart: unless-stopped
    environment:
      PORT: 4001
      USER_DB_URL: postgres://user:userpass@postgres-user:5432/userdb
      JWT_SECRET: supersecretjwt
    depends_on:
      - postgres-user
    networks:
      - backend

  chat-service-1:
    build:
      context: ./backend/chat-service
    container_name: chat-service-1
    restart: unless-stopped
    environment:
      PORT: 4002
      CHAT_DB_URL: postgres://chat:chatpass@postgres-chat:5432/chatdb
      JWT_SECRET: supersecretjwt
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - postgres-chat
      - redis
    networks:
      - backend

  chat-service-2:
    build:
      context: ./backend/chat-service
    container_name: chat-service-2
    restart: unless-stopped
    environment:
      PORT: 4002
      CHAT_DB_URL: postgres://chat:chatpass@postgres-chat:5432/chatdb
      JWT_SECRET: supersecretjwt
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - postgres-chat
      - redis
    networks:
      - backend

  frontend:
    build:
      context: ./frontend
    container_name: frontend
    restart: unless-stopped
    environment:
      FRONTEND_PORT: 3000
      # AI-generated: Vite bakes env at build-time; app uses sane defaults
      VITE_USER_GRAPHQL_HTTP: /api/user/graphql
      VITE_CHAT_GRAPHQL_HTTP: /api/chat/graphql
    networks:
      - backend

  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - user-service-1
      - user-service-2
      - chat-service-1
      - chat-service-2
      - frontend
    networks:
      - backend

volumes:
  postgres-user-data:
  postgres-chat-data:

networks:
  backend:
    driver: bridge

