# AI-generated nginx configuration for load balancing and WebSocket proxying
worker_processes  1;

events {
  worker_connections  1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  sendfile        on;
  keepalive_timeout  65;

  upstream user_service_upstream {
    server user-service-1:4001;
    server user-service-2:4001;
  }

  upstream chat_service_upstream {
    server chat-service-1:4002;
    server chat-service-2:4002;
  }

  upstream frontend_upstream {
    server frontend:3000;
  }

  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  server {
    listen 80;

    # Frontend
    location / {
      proxy_pass http://frontend_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # User-service GraphQL (HTTP + WebSocket)
    location /api/user/graphql {
      # AI-generated rewrite: external path -> internal /graphql
      proxy_pass http://user_service_upstream/graphql;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Chat-service GraphQL (HTTP + WebSocket)
    location /api/chat/graphql {
      # AI-generated rewrite: external path -> internal /graphql
      proxy_pass http://chat_service_upstream/graphql;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}

